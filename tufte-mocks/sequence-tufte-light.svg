<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 447.67949999999996 430" width="447.67949999999996" height="430" style="--bg:#FFFFF8;--fg:#111111;--line:#AAAAAA;--accent:#7A0000;--muted:#888888;--surface:#F5F0E8;--border:#CCCCCC;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Palatino:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Palatino', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
  .node, .class-node, .entity, .actor[data-type="participant"], .note, .block, .timeline-event, .journey-task { filter: url(#bm-shadow); }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
  <filter id="bm-shadow" x="-12%" y="-10%" width="128%" height="136%">
    <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.08" />
  </filter>
</defs>
<line class="lifeline" data-actor="R" x1="83.28399999999999" y1="70" x2="83.28399999999999" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="L" x1="223.284" y1="70" x2="223.284" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="P" x1="363.284" y1="70" x2="363.284" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="R" data-to="L" data-label="Submit experiment" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="83.28399999999999" y1="90" x2="223.284" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="153.284" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Submit experiment</text>
</g>
<g class="message" data-from="L" data-to="L" data-label="Run trials" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="223.284,130 253.284,130 253.284,150 223.284,150" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="261.284" y="140" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Run trials</text>
</g>
<g class="message" data-from="L" data-to="R" data-label="Results" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="223.284" y1="200" x2="83.28399999999999" y2="200" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="153.284" y="190" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Results</text>
</g>
<g class="message" data-from="R" data-to="P" data-label="Submit manuscript" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="83.28399999999999" y1="240" x2="363.284" y2="240" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="223.284" y="230" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Submit manuscript</text>
</g>
<g class="message" data-from="P" data-to="R" data-label="Revisions requested" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="363.284" y1="280" x2="83.28399999999999" y2="280" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="223.284" y="270" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Revisions requested</text>
</g>
<g class="message" data-from="R" data-to="P" data-label="Revised manuscript" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="83.28399999999999" y1="320" x2="363.284" y2="320" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="223.284" y="310" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Revised manuscript</text>
</g>
<g class="message" data-from="P" data-to="R" data-label="Accepted" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="363.284" y1="360" x2="83.28399999999999" y2="360" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="223.284" y="350" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Accepted</text>
</g>
<g class="actor" data-id="R" data-label="Researcher" data-type="participant">
  <rect x="29.999999999999993" y="30" width="106.568" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="83.28399999999999" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Researcher</text>
</g>
<g class="actor" data-id="L" data-label="Lab" data-type="participant">
  <rect x="183.284" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="223.284" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Lab</text>
</g>
<g class="actor" data-id="P" data-label="Peer Review" data-type="participant">
  <rect x="308.8885" y="30" width="108.79099999999998" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="363.284" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Peer Review</text>
</g>
</svg>
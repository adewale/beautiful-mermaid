<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 308.50199999999995 744.6" width="308.50199999999995" height="744.6" style="--bg:#FFFFF8;--fg:#111111;--line:#AAAAAA;--accent:#7A0000;--muted:#888888;--surface:#F5F0E8;--border:#CCCCCC;background:#FFFFF8">
<style>

    --_inner-stroke:  #e2e2dc;
    --_key-badge:     #e7e7e1;
  }
  .node, .class-node, .entity, .actor[data-type="participant"], .note, .block, .timeline-event, .journey-task { filter: url(#bm-shadow); }
</style>

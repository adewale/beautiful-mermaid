<polyline class="architecture-edge" data-from="api" data-to="bus" data-from-side="B" data-to-side="T" data-from-boundary="item" data-to-boundary="item" data-label="async fan-out" points="123.9855,170 123.9855,147 390.58500000000004,147 390.58500000000004,120" marker-end="url(#architecture-arrow-end)" />

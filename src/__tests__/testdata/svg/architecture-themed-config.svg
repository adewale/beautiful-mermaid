<rect x="302.44" y="111.9" width="119.672" height="32.2" class="architecture-edge-label-bg" rx="0" ry="0" />
<text x="362.276" y="128" class="architecture-edge-label-text" text-anchor="middle" font-size="14" font-weight="400" dy="4.8999999999999995">reads &lt;records&gt;</text>

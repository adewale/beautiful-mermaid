  <rect class="architecture-service-accent" x="474.79" y="104" width="4" height="48" rx="0" ry="0" />
  <g class="architecture-icon" data-icon="database">
  <rect class="architecture-icon-bg" x="488.79" y="115" width="26" height="26" rx="0" ry="0" />

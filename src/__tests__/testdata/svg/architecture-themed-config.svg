  <rect class="architecture-service-card" x="76" y="104" width="173.762" height="48" rx="0" ry="0" />
  <rect class="architecture-service-accent" x="76" y="104" width="4" height="48" rx="0" ry="0" />
  <g class="architecture-icon" data-icon="server">
  <rect class="architecture-icon-bg" x="90" y="115" width="26" height="26" rx="0" ry="0" />
  <rect class="architecture-icon-mark" x="97.28" y="121.76" width="11.44" height="12.48" rx="0" ry="0" />
<path class="architecture-icon-mark" d="M 98.84 125.92 H 107.16" />
<path class="architecture-icon-mark" d="M 98.84 129.56 H 107.16" />
<circle class="architecture-icon-fill" cx="99.88" cy="132.16" r="0.78" />
<circle class="architecture-icon-fill" cx="106.12" cy="132.16" r="0.78" />
</g>
  <text x="130" y="128" class="architecture-service-label" text-anchor="start" font-size="16" font-weight="500" dy="5.6">API &amp; &lt;Gateway&gt;</text>
</g>
</svg>
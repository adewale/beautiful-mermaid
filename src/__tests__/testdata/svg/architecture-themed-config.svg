<ellipse class="architecture-icon-mark" cx="501.79" cy="133.2" rx="6.24" ry="2.6" />
</g>
  <text x="528.79" y="128" class="architecture-service-label" text-anchor="start" font-size="16" font-weight="500" dy="5.6">Primary DB</text>
</g>
